format = """
$os\
$directory\
$git_branch\
$git_status\
$character
"""

# =========================================================
# OS ICON
# =========================================================

[os]
disabled = false
format = "[$symbol](bold blue) "

[os.symbols]
Arch = ""

# =========================================================
# DIRECTORY
# =========================================================

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

# =========================================================
# GIT
# =========================================================

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

# =========================================================
# PROMPT CHARACTER
# =========================================================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
